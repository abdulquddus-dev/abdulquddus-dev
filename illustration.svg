<svg width="430" height="300" viewBox="0 0 430 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lampGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5C542"/>
      <stop offset="100%" stop-color="#C99A2A"/>
    </linearGradient>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6F5BD0"/>
    </linearGradient>
    <radialGradient id="glowSoft" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4EA6FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4EA6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="lampGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <ellipse cx="215" cy="150" rx="210" ry="150" fill="url(#glowSoft)"/>

  <!-- lamp -->
  <g>
    <circle cx="378" cy="90" r="22" fill="url(#lampGrad)" filter="url(#lampGlow)" opacity="0.6"/>
    <line x1="330" y1="40" x2="366" y2="88" stroke="url(#lampGrad)" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="378" cy="94" rx="24" ry="13" fill="url(#lampGrad)"/>
    <rect x="368" y="120" width="14" height="70" rx="4" fill="#2a3352"/>
    <rect x="350" y="188" width="52" height="8" rx="4" fill="#2a3352"/>
  </g>

  <!-- monitor -->
  <g>
    <rect x="70" y="18" width="250" height="160" rx="12" fill="#0c1020" stroke="#2a3352" stroke-width="3"/>
    <rect x="86" y="36" width="52" height="7" rx="3.5" fill="#A78BFA"/>
    <rect x="86" y="53" width="140" height="7" rx="3.5" fill="#7CC4FF"/>
    <rect x="86" y="70" width="108" height="7" rx="3.5" fill="#F5C542"/>
    <rect x="86" y="87" width="160" height="7" rx="3.5" fill="#3a4470"/>
    <rect x="86" y="104" width="70" height="7" rx="3.5" fill="#7CC4FF"/>
    <rect x="86" y="121" width="120" height="7" rx="3.5" fill="#3a4470"/>
    <rect x="150" y="178" width="10" height="26" fill="#2a3352"/>
    <rect x="118" y="202" width="74" height="8" rx="4" fill="#2a3352"/>
  </g>

  <!-- keyboard -->
  <rect x="64" y="224" width="180" height="22" rx="6" fill="#161c34" stroke="#2a3352" stroke-width="1.5"/>

  <!-- mug -->
  <g>
    <rect x="30" y="214" width="26" height="26" rx="5" fill="url(#mugGrad)"/>
    <path d="M56 219 q12 0 12 9 t-12 9" fill="none" stroke="url(#mugGrad)" stroke-width="3.5"/>
  </g>

  <!-- code badge -->
  <g>
    <rect x="250" y="230" width="34" height="34" rx="9" fill="#A78BFA" fill-opacity="0.14" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="267" y="253" font-family="DejaVu Sans Mono, monospace" font-size="14" font-weight="700" fill="#A78BFA" text-anchor="middle">&lt;/&gt;</text>
  </g>
</svg>
