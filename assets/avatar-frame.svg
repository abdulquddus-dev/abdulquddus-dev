<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4EA6FF"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4EA6FF"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="120" cy="120" r="100"/>
    </clipPath>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- glow ring -->
  <circle cx="120" cy="120" r="112" fill="none" stroke="url(#ring)" stroke-width="10" filter="url(#glow)"/>
  <circle cx="120" cy="120" r="112" fill="none" stroke="url(#ring)" stroke-width="6"/>

  <!-- REPLACE "abdulquddus-dev" BELOW WITH YOUR REAL GITHUB USERNAME -->
  <image href="https://github.com/abdulquddus-dev.png?size=240"
         x="20" y="20" width="200" height="200"
         clip-path="url(#circleClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- thin inner border -->
  <circle cx="120" cy="120" r="100" fill="none" stroke="#0d1120" stroke-width="4"/>
</svg>
